<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Video Recording Test — PI</title>
<style>
  :root{--orange:#ff6600;--bg:#faf8f5;--t:#1a1a1a;--t3:#8E857C;--b:#e8e4df}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Inter',Arial,sans-serif;line-height:1.5}
  .wrap{max-width:640px;margin:0 auto;padding:0 0 60px}
  .top{background:var(--orange);color:#fff;padding:18px 20px}
  .top h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.02em}
  .top p{margin:4px 0 0;font-size:13px;opacity:.9}
  .pad{padding:18px 20px}
  video{width:100%;background:#000;border-radius:12px;display:block;aspect-ratio:3/4;max-height:60vh;object-fit:cover}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:24px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--orange);color:#fff}
  .btn.rec{background:#E8443B;color:#fff}
  .btn.ghost{background:#fff;color:var(--t);border:1.5px solid var(--b)}
  .btn:disabled{opacity:.4;cursor:default}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:22px;margin:14px 0 0;color:var(--orange)}
  .timer.warn{color:#E8443B}
  .panel{background:#fff;border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-top:18px;font-size:13px}
  .panel h2{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3)}
  .panel div{margin:3px 0;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#444;word-break:break-all}
  .ok{color:#2E7A3E;font-weight:700}
  .bad{color:#E8443B;font-weight:700}
  .hint{font-size:13px;color:var(--t3);margin-top:10px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#E8443B;margin-right:6px;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Video Recording Test</h1>
    <p>Performance Intelligence — camera check (temporary)</p>
  </div>
  <div class="pad">
    <video id="preview" playsinline muted autoplay></video>
    <div class="timer" id="timer" style="display:none">0:00</div>

    <div class="row">
      <button class="btn primary" id="start">Start camera</button>
      <button class="btn rec" id="record" disabled>● Record</button>
      <button class="btn ghost" id="stop" disabled>Stop</button>
    </div>
    <div class="row">
      <button class="btn ghost" id="download" disabled>Download clip</button>
      <button class="btn ghost" id="again" disabled>Record again</button>
    </div>
    <p class="hint" id="hint">Tap "Start camera", allow access, then "Record". Max 2 minutes (auto-stops). After stopping, the clip plays back here — check video <em>and</em> sound.</p>

    <div class="panel">
      <h2>Diagnostics</h2>
      <div id="d-support"></div>
      <div id="d-mime"></div>
      <div id="d-state"></div>
      <div id="d-size"></div>
      <div id="d-dur"></div>
      <div id="d-ua"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var preview=document.getElementById('preview');
  var bStart=document.getElementById('start'), bRec=document.getElementById('record'),
      bStop=document.getElementById('stop'), bDl=document.getElementById('download'), bAgain=document.getElementById('again');
  var timerEl=document.getElementById('timer');
  var dSupport=document.getElementById('d-support'), dMime=document.getElementById('d-mime'),
      dState=document.getElementById('d-state'), dSize=document.getElementById('d-size'),
      dDur=document.getElementById('d-dur'), dUa=document.getElementById('d-ua');
  var stream=null, rec=null, chunks=[], blob=null, blobUrl=null, t0=0, tick=null;
  var CAP=120;

  dUa.textContent='UA: '+navigator.userAgent;

  function pickMime(){
    var cands=['video/mp4','video/mp4;codecs=avc1','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
    if(!window.MediaRecorder||!MediaRecorder.isTypeSupported) return '';
    for(var i=0;i<cands.length;i++){ if(MediaRecorder.isTypeSupported(cands[i])) return cands[i]; }
    return '';
  }

  var hasMR=!!window.MediaRecorder, hasGUM=!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
  dSupport.innerHTML='getUserMedia: '+(hasGUM?'<span class="ok">yes</span>':'<span class="bad">NO</span>')
    +' &nbsp; MediaRecorder: '+(hasMR?'<span class="ok">yes</span>':'<span class="bad">NO</span>');
  var chosen=pickMime();
  dMime.innerHTML='Chosen format: '+(chosen?('<span class="ok">'+chosen+'</span>'):'<span class="bad">none supported</span>');
  if(!hasGUM||!hasMR){ bStart.disabled=true; document.getElementById('hint').innerHTML='<span class="bad">This browser cannot record video.</span> Note the diagnostics below and send them over.'; }

  function fmt(s){var m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}

  bStart.onclick=function(){
    dState.textContent='State: requesting camera…';
    navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true}).then(function(s){
      stream=s; preview.srcObject=s; preview.muted=true; preview.play();
      bStart.disabled=true; bRec.disabled=false;
      dState.innerHTML='State: <span class="ok">camera live</span>';
    }).catch(function(err){
      dState.innerHTML='State: <span class="bad">'+err.name+' — '+err.message+'</span>';
    });
  };

  bRec.onclick=function(){
    chunks=[]; blob=null;
    try{ rec=chosen?new MediaRecorder(stream,{mimeType:chosen}):new MediaRecorder(stream); }
    catch(e){ dState.innerHTML='State: <span class="bad">MediaRecorder failed: '+e.message+'</span>'; return; }
    rec.ondataavailable=function(ev){ if(ev.data&&ev.data.size) chunks.push(ev.data); };
    rec.onstop=function(){
      blob=new Blob(chunks,{type:chosen||'video/mp4'});
      if(blobUrl)URL.revokeObjectURL(blobUrl);
      blobUrl=URL.createObjectURL(blob);
      preview.srcObject=null; preview.src=blobUrl; preview.muted=false; preview.controls=true;
      bDl.disabled=false; bAgain.disabled=false;
      dSize.textContent='Clip size: '+(blob.size/1048576).toFixed(2)+' MB ('+blob.type+')';
    };
    rec.start();
    t0=Date.now(); timerEl.style.display='block'; timerEl.classList.remove('warn'); timerEl.textContent='0:00';
    tick=setInterval(function(){
      var s=Math.floor((Date.now()-t0)/1000);
      timerEl.textContent=fmt(s);
      if(s>=CAP-10) timerEl.classList.add('warn');
      if(s>=CAP) stopRec();
    },250);
    bRec.disabled=true; bStop.disabled=false;
    dState.innerHTML='State: <span class="bad"><span class="dot"></span>recording…</span>';
  };

  function stopRec(){
    if(rec&&rec.state!=='inactive') rec.stop();
    if(tick){clearInterval(tick);tick=null;}
    var dur=((Date.now()-t0)/1000).toFixed(1);
    dDur.textContent='Recorded duration: '+dur+' s';
    bStop.disabled=true;
    dState.innerHTML='State: <span class="ok">stopped — playing back</span>';
  }
  bStop.onclick=stopRec;

  bDl.onclick=function(){
    if(!blob)return;
    var ext=(blob.type.indexOf('mp4')>=0)?'mp4':'webm';
    var a=document.createElement('a'); a.href=blobUrl; a.download='pi-video-test.'+ext;
    document.body.appendChild(a); a.click(); a.remove();
  };

  bAgain.onclick=function(){
    preview.src=''; preview.controls=false; preview.srcObject=stream; preview.muted=true; preview.play();
    bRec.disabled=false; bDl.disabled=true; bAgain.disabled=true;
    timerEl.style.display='none';
    dSize.textContent=''; dDur.textContent='';
    dState.innerHTML='State: <span class="ok">camera live</span>';
  };
})();
</script>
</body>
</html>
