name: Weekly Briefing Content Update

on:
  schedule:
    # PRIMARY: 06:17 UTC every Monday.
    # Deliberately off the top of the hour — GitHub drops scheduled
    # jobs that land on :00 during high-load periods. :17 is far safer.
    - cron: '17 6 * * 1'

    # BACKUP: 11:23 UTC every Monday.
    # If the primary run was dropped by GitHub, this catches it.
    # A guard step below ensures it does nothing if the primary already ran today.
    - cron: '23 11 * * 1'

  # Manual trigger — a "Run workflow" button on the Actions tab.
  # Use this any week both scheduled runs get dropped.
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can inspect today's commits

      - name: Skip if content already generated today
        id: guard
        run: |
          # Only the backup schedule (and only it) needs guarding.
          # Manual runs and the primary run always proceed.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TODAY=$(date -u +%Y-%m-%d)
            # Look for a content-update commit authored today (UTC).
            FOUND=$(git log --since="${TODAY}T00:00:00Z" --until="${TODAY}T23:59:59Z" \
                      --pretty=format:'%s' | grep -c 'Weekly briefing content update' || true)
            if [ "$FOUND" -ge 1 ]; then
              echo "A content update already exists for ${TODAY} — skipping this run."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "No content update yet for ${TODAY} — proceeding."
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Manual run (workflow_dispatch) — always proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install anthropic requests

      - name: Generate and update weekly content
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_content.py

      - name: Verify update succeeded
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "Weekly briefing update complete"
          echo "Week: $(date +%V)"
          echo "Date: $(date '+%A, %d %B %Y')"

      # generate_content.py commits the new index.html to the repo via the
      # GitHub API. That commit is NOT in this runner's working tree (the
      # checkout happened before generation). Pull it so the deploy step
      # publishes the freshly generated file, not the pre-generation one.
      - name: Pull the just-committed content
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --no-rebase origin main
          echo "Working tree now at: $(git log -1 --pretty=format:'%h %s')"

      # Deploy directly from THIS workflow run. We do not rely on the commit
      # triggering deploy-firebase.yml — commits made with the automatic
      # GITHUB_TOKEN do not trigger other workflows (GitHub loop-prevention).
      # This mirrors deploy-firebase.yml exactly: same action, same secret,
      # same channel/project. Reuses the existing FIREBASE_SERVICE_ACCOUNT.
      - name: Deploy to Firebase Hosting
        if: steps.guard.outputs.skip != 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pi-briefing-38ddc

      - name: Confirm deploy
        if: steps.guard.outputs.skip != 'true'
        run: echo "Deployed freshly generated content to https://pi-briefing-38ddc.web.app"

      - name: Note when skipped
        if: steps.guard.outputs.skip == 'true'
        run: echo "Backup run skipped — primary already generated today's content."
