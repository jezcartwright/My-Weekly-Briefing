<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Brief">

<title>Executive Daily Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D0D;--s:#111;--s2:#161616;--b:#1E1E1E;--b2:#252525;--t:#EAE4D8;--t2:#A09890;--t3:#5A5248;--gold:#C9A84C;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,20px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'IBM Plex Mono',monospace}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{padding:calc(var(--st) + 12px) 20px 12px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg)}
.hl .sub{font-size:9px;letter-spacing:.22em;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.hl h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#F4EEE4;letter-spacing:-.03em}
.hr{display:flex;align-items:center;gap:12px}
.hdate{font-size:10px;color:var(--t3);text-align:right;line-height:1.7}
.hbadge{font-size:9px;color:var(--gold);letter-spacing:.1em}
#nbtn{background:var(--s);border:1px solid var(--b2);border-radius:2px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
#nbtn.on{color:var(--gold);border-color:var(--gold)}
#vt,#vl{display:flex;flex-direction:column;flex:1;overflow:hidden}
#vl{display:none}
#tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 14px 10px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.tab.on{color:var(--t)}
.sa{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(var(--sb) + 20px)}
.ci{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--b);animation:fu .3s ease both}
.ci .ico{font-size:20px}
.ci .cn{font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3px}
.ci .cd{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--t2);line-height:1.5}
.tl{display:flex;flex-direction:column;gap:12px}
.tc{background:var(--s);border:1px solid var(--b);border-radius:3px;overflow:hidden;transition:border-color .2s,background .2s;animation:fu .35s ease both}
.tc:nth-child(1){animation-delay:.05s}.tc:nth-child(2){animation-delay:.1s}.tc:nth-child(3){animation-delay:.15s}.tc:nth-child(4){animation-delay:.2s}
.tc.op{background:var(--s2)}
.th{padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;-webkit-user-select:none;user-select:none}
.tn{font-size:10px;opacity:.5;flex-shrink:0;margin-top:2px}
.tw{flex:1}
.tt{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#F4EEE4;letter-spacing:-.01em;line-height:1.3;margin-bottom:6px}
.thl{font-size:12px;color:var(--t2);line-height:1.6;font-style:italic}
.tog{font-size:18px;color:var(--b2);flex-shrink:0;margin-top:1px;transition:transform .25s,color .2s;line-height:1}
.tc.op .tog{transform:rotate(45deg)}
.tb{display:none;padding:16px 18px 18px;border-top:1px solid var(--b)}
.tc.op .tb{display:block}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.two{grid-template-columns:1fr}}
.lbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.bt{font-size:12px;color:var(--t2);line-height:1.85}
.ref{font-size:10px;color:var(--t3);margin-top:7px;line-height:1.6;font-style:italic}
.ref a{color:var(--t3);text-decoration:underline}
.it{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#CEC6B6;line-height:1.85}
.it-attr{font-family:'IBM Plex Mono',monospace;font-style:normal;font-size:9px;color:var(--gold);letter-spacing:.1em;margin-top:6px;display:block}
.db{background:#0A0A0A;border-left:2px solid;padding:13px 14px}
.di{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.di:last-child{margin-bottom:0}
.da{font-size:9px;margin-top:3px;flex-shrink:0}
.dt{font-size:11px;color:#777;line-height:1.75}
#lt{padding:14px 18px 10px;border-bottom:1px solid var(--b);flex-shrink:0}
#lt .ltt{font-family:'Playfair Display',serif;font-size:18px;color:#F4EEE4;margin-bottom:3px}
#lt .ltc{font-size:10px;color:var(--t3);letter-spacing:.08em}
#lf{display:flex;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0;scrollbar-width:none}
#lf::-webkit-scrollbar{display:none}
.lfb{flex-shrink:0;padding:9px 14px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
.lfb.on{color:var(--t);border-bottom-color:var(--gold)}
.le{text-align:center;padding:60px 30px}
.le .lei{font-size:26px;opacity:.3;margin-bottom:12px;display:block}
.le .let{font-family:'Playfair Display',serif;font-size:15px;color:var(--t2);margin-bottom:8px}
.le .les{font-size:11px;color:var(--t3);line-height:1.8}
.dg{margin-bottom:24px;animation:fu .3s ease both}
.dl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--b)}
.lc{background:var(--s);border:1px solid var(--b);border-radius:3px;margin-bottom:8px;overflow:hidden}
.lc.op{background:var(--s2)}
.lh{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;-webkit-user-select:none;user-select:none}
.lcat{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.lci{font-size:11px}.lcn{font-size:9px;letter-spacing:.14em;text-transform:uppercase}
.ltt2{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:#F4EEE4;line-height:1.3;margin-bottom:4px}
.lhl{font-size:11px;color:var(--t2);font-style:italic;line-height:1.5}
.ltog{font-size:16px;color:var(--b2);flex-shrink:0;transition:transform .2s,color .2s}
.lc.op .ltog{transform:rotate(45deg)}
.lb{display:none;padding:13px 16px 14px;border-top:1px solid var(--b)}
.lc.op .lb{display:block}
.lb .bt{font-size:11px}.lb .it{font-size:12px}.lb .dt{font-size:11px}.lb .db{margin-top:10px}.lb .ref{font-size:10px}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hl"><div class="sub">Executive Intelligence</div><h1>Daily Briefing</h1></div>
    <div class="hr">
      <div class="hdate"><div id="de"></div><div class="hbadge">STAY SHARP</div></div>
      <button id="nbtn" onclick="tv()"><span id="ni">&#9643;</span><span id="nl">Library</span></button>

  </div>
  <div id="vt"><div id="tabs"></div><div class="sa" id="ts"></div></div>

</div>

var CATS=[
  {id:"leadership",label:"Leadership",icon:"&#9672;",color:"#C9A84C"},

var D={};

D.leadership=[[
  {
    title:"The Successor Problem",
    headline:"Most leaders plan their exit too late — succession is a strategy, not an event.",
    why:"A landmark study by McKinsey found that poor CEO transitions destroy an average of $1 trillion in market value annually among S&P 500 companies alone. Yet fewer than 35% of boards say they have a credible internal successor ready. The cost is not just financial — rushed successions destabilise culture, strategy, and client relationships simultaneously.",
    ref:"McKinsey Quarterly: 'The $1 trillion prize: Plugging the succession gap' (2023)",
    insight:"The secret of my success is that we have gone to exceptional lengths to hire the best people in the world.",
    attribution:"Steve Jobs, co-founder of Apple",
    deeper:["Ask your client: 'If you were gone tomorrow, who steps up — and what does that reveal about your leadership?'","Read 'The CEO Next Door' by Elena Botelho — based on a 10-year study of 17,000 executives","HBR: 'Are You Ready to Be a CEO?' (Harvard Business Review, 2023) — maps the internal readiness gap"]
  },
  {
    title:"Psychological Safety at Scale",
    headline:"Teams that feel safe to speak up outperform those that don't — but creating that safety gets harder as organisations grow.",
    why:"Google's two-year Project Aristotle study of 180 teams found psychological safety was the single most important factor in team effectiveness — ahead of individual talent, resources, or structure. Amy Edmondson's follow-on research at Harvard showed that high-safety teams in hospitals reported more errors, not fewer — because people felt safe surfacing problems rather than hiding them.",
    ref:"Edmondson, A. (1999). 'Psychological Safety and Learning Behavior in Work Teams.' Administrative Science Quarterly, 44(2), 350-383.",
    insight:"The biggest risk is not taking any risk. In a world that is changing quickly, the only strategy guaranteed to fail is not taking risks.",
    attribution:"Mark Zuckerberg, CEO of Meta",
    deeper:["Track how often you interrupt vs. build on others' ideas in your next meeting","Amy Edmondson's 'The Fearless Organisation' (2018) is the definitive leadership resource","HBR: 'High-Performing Teams Need Psychological Safety — Here's How to Create It' (2017)"]
  },
  {
    title:"Strategy as Saying No",
    headline:"The quality of a strategy is measured by what it excludes, not what it includes.",
    why:"A landmark study in the Strategic Management Journal analysed 800 companies over 20 years and found that focused strategies consistently outperformed diversified ones in total shareholder return. Michael Porter's foundational work at Harvard Business School established that competitive advantage comes from making choices — and that the essence of strategy is choosing what NOT to do.",
    ref:"Porter, M.E. (1996). 'What Is Strategy?' Harvard Business Review, Nov-Dec 1996, pp. 61-78.",
    insight:"People think focus means saying yes to the thing you've got to focus on. But that's not what it means at all. It means saying no to the hundred other good ideas that there are.",
    attribution:"Steve Jobs, co-founder of Apple, at the Apple Worldwide Developers Conference, 1997",
    deeper:["Ask: 'What are we explicitly choosing NOT to do — and who is unhappy about that?'","Roger Martin's 'Playing to Win' (2013) is the clearest practical framework for strategic choice","HBR: 'Can You Say What Your Strategy Is?' (2008) — a diagnostic most leadership teams fail"]
  },
  {
    title:"The Hidden Cost of Consensus",
    headline:"Leaders who optimise for agreement often sacrifice speed, innovation, and accountability.",
    why:"Research by Cass Sunstein and Reid Hastie published in their book 'Wiser' showed that group deliberation consistently produces worse decisions than well-structured individual judgment — a phenomenon they call 'group polarisation.' In business settings, McKinsey research found that organisations with clear decision rights and accountability outgrow peers by up to 6 percentage points annually.",
    ref:"Sunstein, C. & Hastie, R. (2014). 'Wiser: Getting Beyond Groupthink to Make Groups Smarter.' Harvard Business Review Press.",
    insight:"Consensus is the negation of leadership.",
    attribution:"Margaret Thatcher, Former UK Prime Minister",
    deeper:["Where are decisions stalling because someone won't commit without consensus?","Jeff Bezos's 'disagree and commit' framework — detailed in his 2016 Amazon shareholder letter","McKinsey: 'Decision making in the age of urgency' (2019) — why speed of decision outperforms quality of consensus"]
  }
],[
  {
    title:"Leading Through Ambiguity",
    headline:"The defining skill of senior leadership is making confident decisions with incomplete information.",
    why:"Research published in the Academy of Management Journal found that executives who demonstrated high 'uncertainty tolerance' were significantly more likely to lead successful transformations. General Stanley McChrystal's experience restructuring the Joint Special Operations Command showed that in complex environments, speed of decision with 70% information consistently outperformed waiting for 90% certainty.",
    ref:"McChrystal, S. (2015). 'Team of Teams: New Rules of Engagement for a Complex World.' Portfolio/Penguin.",
    insight:"In any moment of decision, the best thing you can do is the right thing, the next best thing is the wrong thing, and the worst thing you can do is nothing.",
    attribution:"Theodore Roosevelt, 26th President of the United States",
    deeper:["Ask yourself: 'Am I waiting for data, or waiting for certainty? Those are different things.'","General McChrystal's 'Team of Teams' (2015) on decision-making in genuinely complex environments","HBR: 'How to Make Decisions with Less Data' (2022) — practical tools for ambiguity-tolerant leadership"]
  },
  {
    title:"The Energy Audit",
    headline:"Time management is a red herring — energy management is the real lever for sustained high performance.",
    why:"Jim Loehr and Tony Schwartz's research with elite athletes and then Fortune 500 executives, published in HBR, showed that the key difference between high performers and burnout cases was not hours worked but energy management across four dimensions: physical, emotional, mental, and purpose. Their subsequent study of 200 senior leaders found that those who managed energy deliberately outperformed peers significantly on every measured metric.",
    ref:"Loehr, J. & Schwartz, T. (2001). 'The Making of a Corporate Athlete.' Harvard Business Review, Jan 2001.",
    insight:"Energy, not time, is the fundamental currency of high performance.",
    attribution:"Jim Loehr & Tony Schwartz, 'The Power of Full Engagement' (2003)",
    deeper:["Track your energy (not just your time) across a week — when are you most alive, most drained?","'The Power of Full Engagement' by Loehr & Schwartz (2003) — the foundational research text","HBR: 'Manage Your Energy, Not Your Time' (2007) — the most-read article on executive performance"]
  },
  {
    title:"Narrative Leadership",
    headline:"The most powerful tool a leader has isn't authority or resources — it's the story they tell.",
    why:"Research by Uri Hasson at Princeton using fMRI brain scanning showed that when a speaker tells a story, their brain patterns and the listener's brain patterns synchronise — a phenomenon he calls 'neural coupling.' The stronger the narrative, the stronger the coupling. In organisational contexts, Bain research found that leaders who communicated with narrative were 22 times more memorable than those communicating with data alone.",
    ref:"Hasson, U. et al. (2012). 'Brain-to-brain coupling: a mechanism for creating and sharing a social world.' Trends in Cognitive Sciences, 16(2), 114-121.",
    insight:"The most powerful person in the world is the storyteller. The storyteller sets the vision, values and agenda of an entire generation that is to come.",
    attribution:"Steve Jobs, co-founder of Apple",
    deeper:["What's the story of your organisation right now — and is it one people want to be part of?","Annette Simmons' 'The Story Factor' (2001) — the most practical narrative leadership toolkit","HBR: 'The Irresistible Power of Storytelling as a Strategic Business Tool' (2014)"]

  {
    title:"Delegation as Development",

    ref:"Zenger, J. & Folkman, J. (2012). 'Why Top Leaders Struggle With Delegation.' Harvard Business Review.",
    insight:"If you want to build a ship, don't drum up the people to gather wood, divide the work, and give orders. Instead, teach them to yearn for the vast and endless sea.",
    attribution:"Antoine de Saint-Exupery, author of 'The Little Prince'",
    deeper:["List the 3 tasks you most enjoy at work. Ask: should any of these be someone else's?","Michael Gerber's 'The E-Myth Revisited' (1995) on the founder's trap of staying in the work","Gallup: 'Delegating: A Huge Management Challenge for Entrepreneurs' (2015) — the ROI of letting go"]
  }
]];

D.markets=[[
  {
    title:"The Attention Economy Matures",
    headline:"As digital advertising saturates, brands building genuine communities are pulling decisively ahead.",
    why:"A major study by Edelman found that brand trust has become more valuable than brand awareness as a purchase driver, with 81% of consumers saying trust is a deciding factor. Meanwhile, Forrester Research found the average cost per digital click rose 322% between 2015 and 2023. The brands winning market share are those that shifted from renting attention to owning it through community, content, and direct relationships.",

  {

  {

D.psychology=[[
  {
    title:"The Spotlight Effect",
    headline:"People dramatically overestimate how much others notice and remember their mistakes.",
    why:"Thomas Gilovich and colleagues at Cornell conducted a series of landmark experiments showing that people consistently overestimate the degree to which their actions and appearance are noticed by others. In the original study, participants wearing an embarrassing T-shirt estimated that 50% of observers noticed — the actual figure was 25%. This cognitive distortion keeps talented people silent, risk-averse, and self-censoring in exactly the moments that matter most.",

var ac=CATS[0],oc=null,cv='today',lf='all',ol=null,SK='exec_brief_v2';
function gh(){try{return JSON.parse(localStorage.getItem(SK)||'[]')}catch(e){return[]}}
function sh(h){try{localStorage.setItem(SK,JSON.stringify(h))}catch(e){}}
function tk(){return new Date().toISOString().slice(0,10)}
function rv(id){
  var cat=CATS.find(function(c){return c.id===id});
  var tops=gt(id);
  if(!tops.length)return;
  var h=gh(),k=tk();
  if(h.find(function(e){return e.date===k&&e.catId===id}))return;
  h.unshift({date:k,catId:id,catLabel:cat.label,catIcon:cat.icon,catColor:cat.color,topics:tops});
  sh(h.slice(0,180));
}
function gt(id){
  var sets=D[id];
  if(!sets)return[];
  var d=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  return sets[d%sets.length];
}
function bh(t,color){
  return '<div class="two">'+
    '<div><div class="lbl">Why It Matters</div><div class="bt">'+t.why+'</div>'+
    (t.ref?'<div class="ref">&#128196; '+t.ref+'</div>':'')+'</div>'+
    '<div><div class="lbl" style="color:'+color+'">Key Insight</div>'+
    '<div class="it">&ldquo;'+t.insight+'&rdquo;<span class="it-attr">&#8212; '+t.attribution+'</span></div></div>'+
    '</div>'+
    '<div class="db" style="border-left-color:'+color+'">'+
    '<div class="lbl" style="margin-bottom:9px">Go Deeper &#8594;</div>'+
    t.deeper.map(function(d){return '<div class="di"><span class="da" style="color:'+color+'">&#9656;</span><span class="dt">'+d+'</span></div>';}).join('')+
    '</div>';
}
function rt(){
  document.getElementById('tabs').innerHTML=CATS.map(function(c){
    return '<button class="tab'+(c.id===ac.id?' on':'')+'" style="border-bottom-color:'+(c.id===ac.id?c.color:'transparent')+'" onclick="sc(\''+c.id+'\')"><span style="color:'+c.color+'">'+c.icon+'</span>'+c.label+'</button>';
  }).join('');
}
function sc(id){ac=CATS.find(function(c){return c.id===id});oc=null;rt();rto();rv(id);}
function rto(){
  var tops=gt(ac.id);
  document.getElementById('ts').innerHTML=
    '<div class="ci"><span class="ico" style="color:'+ac.color+'">'+ac.icon+'</span>'+
    '<div><div class="cn" style="color:'+ac.color+'">'+ac.label+'</div>'+
    '<div class="cd">Four high-signal topics to keep you sharp today</div></div></div>'+
    '<div class="tl">'+tops.map(function(t,i){
      return '<div class="tc'+(oc===i?' op':'')+'" onclick="tgc('+i+')">'+
        '<div class="th"><div style="display:flex;gap:10px;align-items:flex-start;flex:1">'+
        '<span class="tn" style="color:'+ac.color+'">0'+(i+1)+'</span>'+
        '<div class="tw"><div class="tt">'+t.title+'</div><div class="thl">'+t.headline+'</div></div></div>'+
        '<div class="tog" style="color:'+(oc===i?ac.color:'#2a2a2a')+'">+</div></div>'+
        '<div class="tb">'+bh(t,ac.color)+'</div></div>';
    }).join('')+'</div>';
  document.getElementById('ts').scrollTop=0;
}
function tgc(i){oc=oc===i?null:i;rto();}
function rlf(){
  var fs=[{id:'all',label:'All'}].concat(CATS.map(function(c){return{id:c.id,label:c.label};}));
  document.getElementById('lf').innerHTML=fs.map(function(f){
    return '<button class="lfb'+(lf===f.id?' on':'')+'" onclick="slf(\''+f.id+'\')">'+f.label+'</button>';
  }).join('');
}
function slf(id){lf=id;ol=null;rlf();rl();}
function rl(){
  var h=gh(),total=h.length;
  document.getElementById('lce').textContent=total===0?'No entries yet':total+' saved briefing'+(total!==1?'s':'')+' stored on this device';
  if(lf!=='all')h=h.filter(function(e){return e.catId===lf;});
  var sc2=document.getElementById('ls');
  if(!h.length){
    sc2.innerHTML='<div class="le"><span class="lei">&#9672;</span>'+
      '<div class="let">'+(lf==='all'?'No briefings saved yet':'No entries for this category')+'</div>'+
      '<div class="les">'+(lf==='all'?'Your briefings save automatically each time you open a category.':'Switch to this category in Today view to start saving.')+'</div></div>';
    return;
  }
  var bd={};
  h.forEach(function(e){if(!bd[e.date])bd[e.date]=[];bd[e.date].push(e);});
  var dates=Object.keys(bd).sort(function(a,b){return b.localeCompare(a);});
  sc2.innerHTML=dates.map(function(date){
    var entries=bd[date];
    var isToday=date===tk();
    var disp=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    return '<div class="dg"><div class="dl">'+(isToday?'Today &mdash; '+disp:disp)+'</div>'+
      entries.map(function(entry){
        return entry.topics.map(function(t,ti){
          var uid=date+'_'+entry.catId+'_'+ti;
          var isOpen=ol===uid;
          return '<div class="lc'+(isOpen?' op':'')+'">'+
            '<div class="lh" onclick="tgl(\''+uid+'\')">'+
            '<div style="flex:1"><div class="lcat">'+
            '<span class="lci" style="color:'+entry.catColor+'">'+entry.catIcon+'</span>'+
            '<span class="lcn" style="color:'+entry.catColor+'">'+entry.catLabel+'</span></div>'+
            '<div class="ltt2">'+t.title+'</div>'+
            '<div class="lhl">'+t.headline+'</div></div>'+
            '<div class="ltog" style="color:'+(isOpen?entry.catColor:'#2a2a2a')+'">+</div></div>'+
            '<div class="lb">'+bh(t,entry.catColor)+'</div></div>';
        }).join('');
      }).join('')+'</div>';
  }).join('');
  sc2.scrollTop=0;
}
function tgl(uid){ol=ol===uid?null:uid;rl();}
function tv(){
  cv=cv==='today'?'library':'today';
  var isLib=cv==='library';
  document.getElementById('vt').style.display=isLib?'none':'flex';
  document.getElementById('vl').style.display=isLib?'flex':'none';
  document.getElementById('nbtn').classList.toggle('on',isLib);
  document.getElementById('ni').innerHTML=isLib?'&#9672;':'&#9643;';
  document.getElementById('nl').innerHTML=isLib?'Today':'Library';
  if(isLib){rlf();rl();}
}
document.getElementById('de').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
rt();rto();rv(ac.id);
</script>
