<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Brief">
<meta name="theme-color" content="#0D0D0D">
<title>Executive Daily Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D0D;--s:#111;--s2:#161616;--b:#1E1E1E;--b2:#252525;--t:#EAE4D8;--t2:#A09890;--t3:#5A5248;--gold:#C9A84C;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,20px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'IBM Plex Mono',monospace}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{padding:calc(var(--st) + 12px) 20px 12px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg)}
.hl .sub{font-size:9px;letter-spacing:.22em;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.hl h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#F4EEE4;letter-spacing:-.03em}
.hr{display:flex;align-items:center;gap:12px}
.hdate{font-size:10px;color:var(--t3);text-align:right;line-height:1.7}
.hbadge{font-size:9px;color:var(--gold);letter-spacing:.1em}
#nbtn{background:var(--s);border:1px solid var(--b2);border-radius:2px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
#nbtn.on{color:var(--gold);border-color:var(--gold)}
#vt,#vl{display:flex;flex-direction:column;flex:1;overflow:hidden}
#vl{display:none}
#tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 14px 10px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.tab.on{color:var(--t)}
.sa{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(var(--sb) + 20px)}
.ci{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--b);animation:fu .3s ease both}
.ci .ico{font-size:20px}
.ci .cn{font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3px}
.ci .cd{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--t2);line-height:1.5}
.tl{display:flex;flex-direction:column;gap:12px}
.tc{background:var(--s);border:1px solid var(--b);border-radius:3px;overflow:hidden;transition:border-color .2s,background .2s;animation:fu .35s ease both}
.tc:nth-child(1){animation-delay:.05s}.tc:nth-child(2){animation-delay:.1s}.tc:nth-child(3){animation-delay:.15s}.tc:nth-child(4){animation-delay:.2s}
.tc.op{background:var(--s2)}
.th{padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;-webkit-user-select:none;user-select:none}
.tn{font-size:10px;opacity:.5;flex-shrink:0;margin-top:2px}
.tw{flex:1}
.tt{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#F4EEE4;letter-spacing:-.01em;line-height:1.3;margin-bottom:6px}
.thl{font-size:12px;color:var(--t2);line-height:1.6;font-style:italic}
.tog{font-size:18px;color:var(--b2);flex-shrink:0;margin-top:1px;transition:transform .25s,color .2s;line-height:1}
.tc.op .tog{transform:rotate(45deg)}
.tb{display:none;padding:16px 18px 18px;border-top:1px solid var(--b)}
.tc.op .tb{display:block}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.two{grid-template-columns:1fr}}
.lbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.bt{font-size:12px;color:var(--t2);line-height:1.85}
.it{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:#CEC6B6;line-height:1.85}
.db{background:#0A0A0A;border-left:2px solid;padding:13px 14px}
.di{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.di:last-child{margin-bottom:0}
.da{font-size:9px;margin-top:3px;flex-shrink:0}
.dt{font-size:11px;color:#777;line-height:1.75}
#lt{padding:14px 18px 10px;border-bottom:1px solid var(--b);flex-shrink:0}
#lt .ltt{font-family:'Playfair Display',serif;font-size:18px;color:#F4EEE4;margin-bottom:3px}
#lt .ltc{font-size:10px;color:var(--t3);letter-spacing:.08em}
#lf{display:flex;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0;scrollbar-width:none}
#lf::-webkit-scrollbar{display:none}
.lfb{flex-shrink:0;padding:9px 14px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
.lfb.on{color:var(--t);border-bottom-color:var(--gold)}
.le{text-align:center;padding:60px 30px}
.le .lei{font-size:26px;opacity:.3;margin-bottom:12px;display:block}
.le .let{font-family:'Playfair Display',serif;font-size:15px;color:var(--t2);margin-bottom:8px}
.le .les{font-size:11px;color:var(--t3);line-height:1.8}
.dg{margin-bottom:24px;animation:fu .3s ease both}
.dl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--b)}
.lc{background:var(--s);border:1px solid var(--b);border-radius:3px;margin-bottom:8px;overflow:hidden}
.lc.op{background:var(--s2)}
.lh{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;-webkit-user-select:none;user-select:none}
.lcat{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.lci{font-size:11px}.lcn{font-size:9px;letter-spacing:.14em;text-transform:uppercase}
.ltt2{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:#F4EEE4;line-height:1.3;margin-bottom:4px}
.lhl{font-size:11px;color:var(--t2);font-style:italic;line-height:1.5}
.ltog{font-size:16px;color:var(--b2);flex-shrink:0;transition:transform .2s,color .2s}
.lc.op .ltog{transform:rotate(45deg)}
.lb{display:none;padding:13px 16px 14px;border-top:1px solid var(--b)}
.lc.op .lb{display:block}
.lb .bt{font-size:11px}.lb .it{font-size:11px}.lb .dt{font-size:11px}.lb .db{margin-top:10px}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hl"><div class="sub">Executive Intelligence</div><h1>Daily Briefing</h1></div>
    <div class="hr">
      <div class="hdate"><div id="de"></div><div class="hbadge">STAY SHARP</div></div>
      <button id="nbtn" onclick="tv()"><span id="ni">◫</span><span id="nl">Library</span></button>
    </div>
  </div>
  <div id="vt"><div id="tabs"></div><div class="sa" id="ts"></div></div>
  <div id="vl"><div id="lt"><div class="ltt">Briefing Library</div><div class="ltc" id="lce"></div></div><div id="lf"></div><div class="sa" id="ls"></div></div>
</div>
<script>
var CATS=[
  {id:"leadership",label:"Leadership",icon:"◈",color:"#C9A84C"},
  {id:"markets",label:"Markets",icon:"◎",color:"#7EB8A4"},
  {id:"psychology",label:"Psychology",icon:"◉",color:"#C47F6B"},
  {id:"technology",label:"Technology",icon:"◇",color:"#7A9CC4"},
  {id:"geopolitics",label:"Geopolitics",icon:"◆",color:"#9B7EC4"},
  {id:"philosophy",label:"Philosophy",icon:"○",color:"#A4B87E"}
];
var D={};
D.leadership=[[{title:"The Successor Problem",headline:"Most leaders plan their exit too late — succession is a strategy, not an event.",why:"Research shows companies with planned succession outperform peers by 20% in the transition year. Yet fewer than 35% of CEOs say they have a credible internal successor ready. For coaches, this is one of the highest-leverage conversations you can have.",insight:"The best time to identify your successor is when you feel most indispensable — that feeling is the signal, not the excuse.",deeper:["Ask your client: 'If you were gone tomorrow, who steps up — and what does that reveal?'","Read 'The CEO Next Door' by Elena Botelho for data on what predicts executive success","Map the top 3 roles in your org: is there a ready-now candidate for each?"]},{title:"Psychological Safety at Scale",headline:"Teams that feel safe to speak up outperform those that don't — but safety gets harder as organisations grow.",why:"Google's Project Aristotle found psychological safety was the #1 predictor of team performance. Yet most leaders inadvertently shut it down: checking phones, dismissing half-baked ideas, rewarding certainty over curiosity.",insight:"Safety isn't created by policy — it's created by how a leader responds in the first 10 seconds after someone shares a bad idea.",deeper:["Track how often you interrupt vs. build on others' ideas in your next meeting","Amy Edmondson's 'The Fearless Organisation' is the definitive resource","Coach prompt: 'Tell me about the last time someone disagreed with you publicly. What happened next?'"]},{title:"Strategy as Saying No",headline:"The quality of a strategy is measured by what it excludes, not what it includes.",why:"Most strategic plans are wish lists disguised as priorities. When everything is a priority, nothing is. Leaders who create genuinely focused strategies consistently outperform those who hedge.",insight:"A strategy that doesn't make stakeholders uncomfortable probably isn't making real choices.",deeper:["Ask: 'What are we explicitly choosing NOT to do — and who is unhappy about that?'","Roger Martin's 'Playing to Win' is the clearest framework for real strategic choice","Help your client list their top 5 priorities — then ask them to cut it to 2"]},{title:"The Hidden Cost of Consensus",headline:"Leaders who optimise for agreement often sacrifice speed, innovation, and accountability.",why:"Consensus culture feels safe but creates slow, watered-down decisions. The best teams move fast because dissent is honoured before the decision — not after.",insight:"The goal isn't for everyone to agree — it's for everyone to commit. These are entirely different things.",deeper:["Where are decisions stalling because someone won't commit without consensus?","Explore 'Radical Candor' by Kim Scott on cultures of honest commitment","Coach prompt: 'Describe the last big decision your team made. Who disagreed — and what happened?'"]}],[{title:"Leading Through Ambiguity",headline:"The defining skill of senior leadership is making confident decisions with incomplete information.",why:"As leaders rise, certainty decreases but the pressure to appear certain increases. This gap is where bad decisions are made.",insight:"Leaders who name the uncertainty out loud almost always make better decisions than those who pretend it doesn't exist.",deeper:["Ask yourself: 'Am I waiting for data, or waiting for certainty?'","General McChrystal's 'Team of Teams' on decision-making in complex environments","Coach prompt: 'What decision are you not making — and what would need to be true to make it?'"]},{title:"The Energy Audit",headline:"Time management is a red herring — energy management is the real lever for sustained high performance.",why:"Most executives are time-rich but energy-poor. Research shows elite performers manage energy across four dimensions: physical, emotional, mental, and purpose.",insight:"You can't lead well if you're running on empty. Protecting your energy isn't self-indulgence — it's a leadership responsibility.",deeper:["Track your energy (not just time) across a week. When are you most alive? Most drained?","'The Power of Full Engagement' by Loehr and Schwartz is foundational","Ask your client: 'What one thing drains you most — and what would happen if you stopped?'"]},{title:"Narrative Leadership",headline:"The most powerful tool a leader has isn't authority or resources — it's the story they tell.",why:"People follow meaning before they follow plans. Leaders who articulate a compelling 'why' consistently build more motivated teams.",insight:"Facts inform. Stories transform. The best leaders know how to wrap data in narrative without sacrificing truth.",deeper:["What's the story of your organisation right now — and is it one people want to be part of?","Annette Simmons' 'The Story Factor' for practical narrative leadership tools","Coach prompt: 'If someone asked your team why they come to work, what stories would they tell?'"]},{title:"Delegation as Development",headline:"The leaders who scale furthest give away their best work — not just their least favourite tasks.",why:"Most leaders delegate what they don't want. The best delegate what they love most — because that's what develops people fastest.",insight:"If you're still doing work someone below you could do, you're not just inefficient — you're blocking their growth.",deeper:["List the 3 tasks you most enjoy. Ask: should any of these be someone else's?","Michael Gerber's 'The E-Myth Revisited' on the founder's trap","Ask your client: 'What would you have to believe about your team to feel safe giving this away?'"]}]];
D.markets=[[{title:"The Attention Economy Matures",headline:"As digital advertising saturates, brands building genuine relationships are pulling decisively ahead.",why:"The cost per click has risen over 300% in five years. The brands winning now shifted from renting attention to owning it through communities and direct relationships.",insight:"The question is no longer 'how do we reach customers?' but 'why would customers want to hear from us?'",deeper:["What percentage of revenue comes from customers who sought you out vs. customers you chased?","Read 'Belonging to the Brand' by Mark Schaefer on community as the new competitive moat","Ask your client: 'If your marketing budget went to zero, what would happen to your pipeline?'"]},{title:"Pricing Power as Strategy",headline:"The ability to raise prices without losing customers is the purest signal of a strong business.",why:"Warren Buffett has long cited pricing power as his number one criterion for business quality. In an inflationary environment, businesses without it are quietly being destroyed.",insight:"If you're afraid to raise your prices, that fear is telling you something important about your value proposition.",deeper:["When did you last raise prices — and what was the actual churn?","Hamilton Helmer's '7 Powers' is the best framework for durable competitive advantage","Coach prompt: 'What would happen to your business if you raised prices 20% tomorrow?'"]},{title:"Private Markets Go Mainstream",headline:"The line between public and private investing is blurring — with major implications for capital allocation.",why:"US public companies have halved since 1996 while private equity AUM has grown 10x. Senior executives increasingly need to understand private market dynamics.",insight:"The shift of economic activity from public to private markets is one of the defining financial trends of our era.",deeper:["What proportion of your investment exposure is to private vs. public markets?","Scott Kupor's 'Secrets of Sand Hill Road' for a clear primer on private equity","How does the illiquidity premium in private markets affect long-term return expectations?"]},{title:"The CFO Becomes a Strategist",headline:"Finance chiefs are increasingly the second most influential voice in strategy — not just its scorekeeper.",why:"Today's top CFOs shape capital allocation, drive digital transformation, and are often the most credible internal critic of the CEO's strategy.",insight:"The best CFOs don't just measure value — they create it. If yours is just counting the score, you may have the wrong person.",deeper:["In your organisation, is the CFO a strategic partner or a financial reporter?","Jack McCullough's 'Secrets of Rockstar CFOs' on what the best finance leaders do differently","What strategic decisions last year were materially shaped by your finance function?"]}]];
D.psychology=[[{title:"The Spotlight Effect",headline:"People dramatically overestimate how much others notice and remember their mistakes.",why:"Cornell research showed people consistently believe others are paying far more attention to them than they are. This explains why talented people stay silent in meetings and self-censor ideas.",insight:"Most of the social fear that holds people back is being generated by a cognitive illusion — not actual social reality.",deeper:["When did you last stay silent out of fear of judgment? What was the actual consequence?","Gilovich's 'The Spotlight Effect' paper (1999) is concise and striking","Coach prompt: 'What's one thing you're not saying — and what are you assuming about how it would land?'"]},{title:"Ego Depletion and Decision Quality",headline:"Willpower and decision-making quality decline across the day — structure matters more than discipline.",why:"Research suggests self-control draws on a limited resource that depletes with use. Judges grant parole more in the morning. Executives make riskier decisions after lunch.",insight:"The best leaders don't rely on willpower — they design environments where willpower isn't needed.",deeper:["When in your day do you make your most important decisions? Is that deliberate?","BJ Fogg's 'Tiny Habits' on designing behaviour rather than relying on motivation","Ask your client: 'What important decisions are you making when you're most depleted?'"]},{title:"Narrative Identity",headline:"The story people tell about themselves is the most powerful determinant of their future behaviour.",why:"Research on narrative identity shows people construct a personal story that gives life coherence — then behave consistently with that story. The deepest coaching work is identity work.",insight:"People don't resist change — they resist becoming someone inconsistent with their self-story.",deeper:["What story is your client telling about why they are where they are — and is it serving them?","Dan McAdams' 'The Stories We Live By' is the foundation; Ibarra's 'Working Identity' is the application","Ask: 'If I asked you to describe yourself professionally in three sentences — what does that reveal?'"]},{title:"Loss Aversion in Leadership",headline:"Leaders fear losses roughly twice as much as they value equivalent gains — with significant strategic consequences.",why:"Kahneman and Tversky's prospect theory is one of the most replicated findings in behavioural economics. In leadership, it manifests as over-retention of failing strategies.",insight:"Much of what looks like strategic conservatism is actually loss aversion in disguise.",deeper:["What strategy are you holding onto primarily because of what's already been spent?","Kahneman's 'Thinking, Fast and Slow' remains essential reading on cognitive biases","Coach prompt: 'If you were starting fresh with no prior investment, would you make the same decision again?'"]}]];
D.technology=[[{title:"AI as Thought Partner",headline:"The most valuable use of AI for executives isn't automation — it's structured thinking at speed.",why:"The more immediate opportunity for senior leaders is using AI to think better: stress-testing strategies, generating counterarguments, pressure-testing assumptions.",insight:"The executives winning with AI right now aren't automating tasks — they're using it to think harder and faster.",deeper:["Have you used an AI to argue the opposite of your current strategy? Try it this week.","Ethan Mollick's 'Co-Intelligence' is the most practically useful book on working with AI","Ask your client: 'What decision this month would have benefited from AI-assisted analysis?'"]},{title:"The Technical Debt Crisis",headline:"Legacy technology infrastructure is quietly becoming the biggest constraint on enterprise transformation.",why:"McKinsey estimates technical debt costs the global economy over $1.5 trillion in lost productivity annually. It's the invisible ceiling on transformation.",insight:"You can't build the future on crumbling foundations — and most enterprises are trying to do exactly that.",deeper:["Ask your CTO: 'What percentage of engineering time goes to maintaining old systems vs. building new ones?'","Martin Fowler's writing on technical debt is the clearest explanation for non-technical leaders","Coach prompt: 'What's the biggest technology constraint on your strategy — and does your board understand it?'"]},{title:"Platforms Beat Products",headline:"The most durable businesses of our era aren't selling products — they're creating ecosystems.",why:"Platform businesses have produced the most extraordinary value creation in business history. Understanding platform economics is now essential for any executive.",insight:"In a platform world, the question isn't 'how good is our product?' but 'how much does our ecosystem lock in participants?'",deeper:["Is there a platform opportunity in your industry you're competing against rather than building?","Sangeet Paul Choudary's 'Platform Revolution' is the clearest strategic framework","What would it take to shift your business model from selling to facilitating?"]},{title:"Cybersecurity as Board Priority",headline:"Cyber risk has moved from IT concern to board-level strategic issue — most boards aren't ready.",why:"The average cost of a data breach now exceeds $4.5 million. Regulators now hold boards personally accountable for cyber governance failures.",insight:"Cybersecurity is no longer a technology problem — it's a governance problem. And governance is the board's job.",deeper:["When did your board last receive a cybersecurity briefing beyond compliance checkbox items?","The World Economic Forum's annual Global Cybersecurity Outlook is the best board-level primer","Does your organisation have a tested incident response plan — and has leadership rehearsed it?"]}]];
D.geopolitics=[[{title:"Reshoring as Strategy",headline:"The era of optimising supply chains purely for cost is over — resilience is now the competitive factor.",why:"COVID exposed the fragility of geographically concentrated supply chains. US, EU, and Asian industrial policy signals a multi-decade shift toward reshoring.",insight:"The supply chain decisions you make in the next three years will define your competitive position for the next twenty.",deeper:["Map your top 10 suppliers. How many are in geopolitically concentrated regions?","Rana Foroohar's 'Homecoming' is the most comprehensive account of the reshoring megatrend","Ask your client: 'Where is your supply chain most fragile — and is that priced into your strategy?'"]},{title:"The Dollar's Slow Erosion",headline:"The US dollar's dominance as the global reserve currency is being gradually but meaningfully challenged.",why:"BRICS nations are developing alternative payment systems. Central bank dollar reserves are declining slowly but steadily.",insight:"Reserve currency shifts happen over decades, not overnight — but companies that prepare early gain a structural advantage.",deeper:["What percentage of your contracts and pricing assumes dollar dominance?","Barry Eichengreen's 'Exorbitant Privilege' provides the historical context every executive should have","How would a 10% reduction in dollar trade settlement affect your business model?"]},{title:"Demographic Divergence",headline:"The world is splitting into ageing rich nations and young growing economies — with profound business implications.",why:"Japan, Germany, South Korea, and China face demographic crises while Sub-Saharan Africa and India have explosive youth populations.",insight:"Demographics is destiny — and the demographic map of 2050 is already largely written in today's birth rates.",deeper:["Where are your growth markets in 2035? Do they align with where the world's consumers and workers will be?","Darrell Bricker's 'Empty Planet' and Paul Morland's 'The Human Tide' offer complementary perspectives","How does your workforce strategy account for the demographic reality of your operating markets?"]},{title:"State Capitalism's Rise",headline:"Government is becoming a more active participant in markets — executives who treat this as temporary are making a strategic mistake.",why:"Industrial policy is back across the ideological spectrum. The US, EU, China, and India are directing capital into strategic sectors.",insight:"In an era of active industrial policy, government relations is no longer a support function — it's a strategic capability.",deeper:["What government initiatives in the next five years could most affect your sector?","Mariana Mazzucato's 'The Entrepreneurial State' changed the conversation on government's role in innovation","What would you do differently if you expected government to be a major player in your market for the next decade?"]}]];
D.philosophy=[[{title:"Stoic Decision-Making",headline:"The ancient Stoic practice of negative visualisation is one of the most practically useful tools for modern leaders.",why:"Negative visualisation is not pessimism. Stoics used it to reduce anxiety and make clearer decisions. In leadership it maps directly to pre-mortem analysis.",insight:"The leader who has already imagined failure is less afraid of it — and therefore more likely to take the bold action needed to avoid it.",deeper:["Before your next major decision, spend 10 minutes imagining it has failed. What does that reveal?","Ryan Holiday's 'The Obstacle is the Way' is the most accessible entry to Stoic leadership practice","Coach prompt: 'If this initiative fails in 12 months, what will have been the reason?'"]},{title:"The Examined Life",headline:"Socrates' insistence that the unexamined life is not worth living has never been more relevant — or more ignored.",why:"In a world of constant input and relentless busyness, genuine self-examination has become countercultural. Yet leaders with deep self-awareness consistently make better decisions.",insight:"Most leaders manage their outer world with great sophistication while leaving their inner world entirely unmanaged.",deeper:["When did you last spend an hour — without input — examining your own motivations and assumptions?","Peter Drucker's essay 'Managing Oneself' is the most practical translation of Socratic self-examination","Ask your client: 'What do you know about yourself that you're not yet acting on?'"]},{title:"Meaning Over Happiness",headline:"Viktor Frankl's insight that meaning sustains people through suffering that happiness cannot is essential for coaches.",why:"Research distinguishes between a meaningful life and a happy one — they often diverge. Coaches who help clients optimise for meaning do more durable work.",insight:"People can endure almost any 'how' if they have a strong enough 'why' — but chasing happiness without meaning leads to emptiness.",deeper:["In what areas are you optimising for comfort when you should be optimising for meaning?","Viktor Frankl's 'Man's Search for Meaning' — if you haven't read it, stop everything","Coach prompt: 'What would you do differently if you were optimising for meaning rather than security or status?'"]},{title:"First Principles Thinking",headline:"Reasoning from fundamentals rather than analogy is the rarest and most valuable cognitive skill in leadership.",why:"Most people reason by analogy. First principles thinkers ask: what is actually true here, independent of precedent? This produces radical innovation.",insight:"The constraints most leaders accept as given are often just assumptions that have never been examined — and examining them is where breakthroughs live.",deeper:["Pick one obvious constraint in your business. Ask: why is this true? Keep asking until you reach something fundamental.","Shane Parrish's 'Clear Thinking' is the best modern resource on mental models for leaders","Ask your client: 'What are you treating as impossible that might actually just be unfamiliar?'"]}]];
var ac=CATS[0],oc=null,cv='today',lf='all',ol=null,SK='exec_brief_v1';
function gh(){try{return JSON.parse(localStorage.getItem(SK)||'[]')}catch(e){return[]}}
function sh(h){try{localStorage.setItem(SK,JSON.stringify(h))}catch(e){}}
function tk(){return new Date().toISOString().slice(0,10)}
function rv(id){var cat=CATS.find(function(c){return c.id===id});var tops=gt(id);if(!tops.length)return;var h=gh(),k=tk();if(h.find(function(e){return e.date===k&&e.catId===id}))return;h.unshift({date:k,catId:id,catLabel:cat.label,catIcon:cat.icon,catColor:cat.color,topics:tops});sh(h.slice(0,180));}
function gt(id){var sets=D[id];if(!sets)return[];var d=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);return sets[d%sets.length];}
function bh(t,color){return '<div class="two"><div><div class="lbl">Why It Matters</div><div class="bt">'+t.why+'</div></div><div><div class="lbl" style="color:'+color+'">Key Insight</div><div class="it">"'+t.insight+'"</div></div></div><div class="db" style="border-left-color:'+color+'"><div class="lbl" style="margin-bottom:9px">Go Deeper</div>'+t.deeper.map(function(d){return '<div class="di"><span class="da" style="color:'+color+'">▸</span><span class="dt">'+d+'</span></div>'}).join('')+'</div>';}
function rt(){document.getElementById('tabs').innerHTML=CATS.map(function(c){return '<button class="tab'+(c.id===ac.id?' on':'')+'" style="border-bottom-color:'+(c.id===ac.id?c.color:'transparent')+'" onclick="sc(\''+c.id+'\')"><span style="color:'+c.color+'">'+c.icon+'</span>'+c.label+'</button>';}).join('');}
function sc(id){ac=CATS.find(function(c){return c.id===id});oc=null;rt();rto();rv(id);}
function rto(){var tops=gt(ac.id);document.getElementById('ts').innerHTML='<div class="ci"><span class="ico" style="color:'+ac.color+'">'+ac.icon+'</span><div><div class="cn" style="color:'+ac.color+'">'+ac.label+'</div><div class="cd">Four high-signal topics to keep you sharp today</div></div></div><div class="tl">'+tops.map(function(t,i){return '<div class="tc'+(oc===i?' op':'')+'" onclick="tgc('+i+')"><div class="th"><div style="display:flex;gap:10px;align-items:flex-start;flex:1"><span class="tn" style="color:'+ac.color+'">0'+(i+1)+'</span><div class="tw"><div class="tt">'+t.title+'</div><div class="thl">'+t.headline+'</div></div></div><div class="tog" style="color:'+(oc===i?ac.color:'#2a2a2a')+'">+</div></div><div class="tb">'+bh(t,ac.color)+'</div></div>';}).join('')+'</div>';document.getElementById('ts').scrollTop=0;}
function tgc(i){oc=oc===i?null:i;rto();}
function rlf(){var fs=[{id:'all',label:'All'}].concat(CATS.map(function(c){return{id:c.id,label:c.label}}));document.getElementById('lf').innerHTML=fs.map(function(f){return '<button class="lfb'+(lf===f.id?' on':'')+'" onclick="slf(\''+f.id+'\')">'+f.label+'</button>';}).join('');}
function slf(id){lf=id;ol=null;rlf();rl();}
function rl(){var h=gh(),total=h.length;document.getElementById('lce').textContent=total===0?'No entries yet':total+' saved briefing'+(total!==1?'s':'')+' stored on this device';if(lf!=='all')h=h.filter(function(e){return e.catId===lf});var sc=document.getElementById('ls');if(!h.length){sc.innerHTML='<div class="le"><span class="lei">◈</span><div class="let">'+(lf==='all'?'No briefings saved yet':'No entries for this category')+'</div><div class="les">'+(lf==='all'?'Your briefings save automatically each time you open a category.':'Switch to this category in Today view to start saving.')+'</div></div>';return;}var bd={};h.forEach(function(e){if(!bd[e.date])bd[e.date]=[];bd[e.date].push(e);});var dates=Object.keys(bd).sort(function(a,b){return b.localeCompare(a)});sc.innerHTML=dates.map(function(date){var entries=bd[date];var isToday=date===tk();var disp=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});return '<div class="dg"><div class="dl">'+(isToday?'Today — '+disp:disp)+'</div>'+entries.map(function(entry){return entry.topics.map(function(t,ti){var uid=date+'_'+entry.catId+'_'+ti;var isOpen=ol===uid;return '<div class="lc'+(isOpen?' op':'')+'"><div class="lh" onclick="tgl(\''+uid+'\')"><div style="flex:1"><div class="lcat"><span class="lci" style="color:'+entry.catColor+'">'+entry.catIcon+'</span><span class="lcn" style="color:'+entry.catColor+'">'+entry.catLabel+'</span></div><div class="ltt2">'+t.title+'</div><div class="lhl">'+t.headline+'</div></div><div class="ltog" style="color:'+(isOpen?entry.catColor:'#2a2a2a')+'">+</div></div><div class="lb">'+bh(t,entry.catColor)+'</div></div>';}).join('');}).join('')+'</div>';}).join('');sc.scrollTop=0;}
function tgl(uid){ol=ol===uid?null:uid;rl();}
function tv(){cv=cv==='today'?'library':'today';var isLib=cv==='library';document.getElementById('vt').style.display=isLib?'none':'flex';document.getElementById('vl').style.display=isLib?'flex':'none';document.getElementById('nbtn').classList.toggle('on',isLib);document.getElementById('ni').textContent=isLib?'◈':'◫';document.getElementById('nl').textContent=isLib?'Today':'Library';if(isLib){rlf();rl();}}
document.getElementById('de').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
rt();rto();rv(ac.id);
</script>
</body>
