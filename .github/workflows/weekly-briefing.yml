name: Weekly Briefing Content Update

on:
  schedule:
    - cron: '17 6 * * 1'
    - cron: '23 11 * * 1'
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Skip if content already generated today
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TODAY=$(date -u +%Y-%m-%d)
            FOUND=$(git log --since="${TODAY}T00:00:00Z" --until="${TODAY}T23:59:59Z" --pretty=format:'%s' | grep -c 'Weekly briefing content update' || true)
            if [ "$FOUND" -ge 1 ]; then
              echo "A content update already exists for ${TODAY} — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "No content update yet for ${TODAY} — proceeding."
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Manual run — always proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install anthropic requests

      - name: Generate and update weekly content
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_content.py

      - name: Verify update succeeded
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "Weekly briefing update complete"
          echo "Week: $(date +%V)"
          echo "Date: $(date '+%A, %d %B %Y')"

      - name: Pull the just-committed content
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --no-rebase origin main
          echo "Working tree now at: $(git log -1 --pretty=format:'%h %s')"

      - name: Deploy to Firebase Hosting
        if: steps.guard.outputs.skip != 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pi-briefing-38ddc

      - name: Confirm deploy
        if: steps.guard.outputs.skip != 'true'
        run: echo "Deployed freshly generated content to https://pi-briefing-38ddc.web.app"

      - name: Note when skipped
        if: steps.guard.outputs.skip == 'true'
        run: echo "Backup run skipped — primary already generated today's content."
