name: Weekly Briefing Content Update

on:
  schedule:
    # 7am UTC every Monday = 8am BST (summer) / 7am GMT (winter)
    # London is always within 1 hour of this — perfectly acceptable
    - cron: '0 7 * * 1'
  
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # needed to commit back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic requests
      
      - name: Generate and update weekly content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_content.py
      
      - name: Verify update succeeded
        run: |
          echo "Weekly briefing update complete"
          echo "Week: $(date +%V)"
          echo "Date: $(date '+%A, %d %B %Y')"
