name: Friday Staging — Generate + Preview + Draft Email

# Friday 12:00 GMT auto-run generates next week's content into the `staging`
# branch (not main), deploys it to a Firebase preview channel, drafts the
# Monday teaser email as a Gmail draft, and emails jc@ the preview URL.
#
# The cron is COMMENTED OUT initially — workflow_dispatch only — so we can
# dry-run safely. Uncomment the schedule block when ready to go live for
# Friday 6 June.

on:
  # schedule:
  #   - cron: '0 12 * * 5'   # 12:00 UTC every Friday
  workflow_dispatch:
    inputs:
      preview_channel_id:
        description: 'Firebase preview channel ID (default: staging-week-N)'
        required: false
        default: ''

jobs:
  stage-friday:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main (read-only, used as starting point)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Reset staging branch to current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete remote staging if present (don't fail if it's not)
          git push origin --delete staging || echo "  (no existing staging branch, that's fine)"
          # Create fresh staging from main
          git checkout -b staging
          git push origin staging
          echo "✓ staging branch reset from main ($(git rev-parse --short HEAD))"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests google-auth google-api-python-client

      - name: Generate content into staging branch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: staging
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: python generate_content.py

      - name: Pull the just-committed staging content
        run: |
          git fetch origin staging
          git checkout staging
          git pull --no-rebase origin staging
          echo "Staging now at: $(git log -1 --pretty=format:'%h %s')"

      - name: Compute current ISO week number
        id: compute_week
        run: echo "week=$(date -u +%V)" >> "$GITHUB_OUTPUT"

      - name: Deploy staging to Firebase preview channel
        id: firebase_preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: pi-briefing-38ddc
          # Channel ID auto-derived from current ISO week unless input overrides.
          # Firebase channels accept lowercase, digits, hyphens.
          channelId: ${{ github.event.inputs.preview_channel_id != '' && github.event.inputs.preview_channel_id || format('staging-week-{0}', steps.compute_week.outputs.week) }}
          expires: 7d

      - name: Build teaser email body from staging index.html
        id: build_teaser
        env:
          PREVIEW_URL: ${{ steps.firebase_preview.outputs.details_url }}
        run: |
          python build_teaser.py index.html "$PREVIEW_URL" > teaser.html
          echo "✓ teaser.html built ($(wc -c < teaser.html) bytes)"

      - name: Save teaser as Gmail draft in jc@'s inbox
        id: save_draft
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          WEEK=$(date -u +%V)
          DATE=$(date -u +"%-d %B %Y")
          SUBJECT="Performance Intelligence Weekly Briefing — Week $WEEK"
          DRAFT_OUT=$(python -m mailer draft \
            --to "jc@jezcartwright.com" \
            --subject "$SUBJECT" \
            --body-file teaser.html)
          echo "$DRAFT_OUT"
          DRAFT_ID=$(echo "$DRAFT_OUT" | grep -oE 'r-?[A-Za-z0-9_-]+|[0-9]+' | head -1)
          echo "draft_id=$DRAFT_ID" >> "$GITHUB_OUTPUT"

      - name: Email jc@ the Friday staging summary
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
          PREVIEW_URL: ${{ steps.firebase_preview.outputs.details_url }}
          DRAFT_ID: ${{ steps.save_draft.outputs.draft_id }}
        run: |
          WEEK=$(date -u +%V)
          cat > friday_summary.html <<EOF
          <html><body style="font-family:system-ui,sans-serif;font-size:14px;color:#222;">
          <h2 style="color:#ff6600;">PI Briefing Week $WEEK — Friday staging complete</h2>
          <p>Your next briefing has been auto-generated and is ready to review:</p>
          <ul>
            <li><strong>Preview the site:</strong> <a href="$PREVIEW_URL">$PREVIEW_URL</a> (valid 7 days)</li>
            <li><strong>Edit the teaser email:</strong> Open your Gmail Drafts — a draft has been saved for Monday's send.</li>
          </ul>
          <p style="background:#fff8ee;border:1px solid #f0e8d0;padding:12px;border-radius:4px;">
          <strong>What happens next:</strong> On Monday 06:17 GMT, the staging branch will be merged to main (deploying live), and the Gmail draft will be sent automatically — whether or not you've edited it.
          </p>
          <p>If you want to abort the Monday auto-publish, run the <strong>publish-monday</strong> workflow manually with the abort input, or delete the staging branch on GitHub.</p>
          <hr><p style="font-size:12px;color:#888;">Run: <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">view in Actions</a></p>
          </body></html>
          EOF
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "[PI Briefing] Week $WEEK staged — ready for your review" \
            --body-file friday_summary.html

      - name: Done
        run: |
          echo "✅ Friday staging complete."
          echo "   Preview URL: ${{ steps.firebase_preview.outputs.details_url }}"
          echo "   Gmail draft saved in jc@jezcartwright.com inbox."
          echo "   Monday workflow will publish + send on schedule."

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          # Best-effort failure notification. If GMAIL_SA_JSON itself is the
          # broken thing, this will fail too, but the workflow already shows
          # red in GitHub Actions so that's still recoverable.
          pip install google-auth google-api-python-client --quiet || true
          WEEK=$(date -u +%V)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > failure.html <<EOF
          <html><body style="font-family:system-ui,sans-serif;font-size:14px;color:#222;">
          <h2 style="color:#c00;">PI Briefing Week $WEEK — Friday staging FAILED</h2>
          <p>The Friday auto-generate workflow did not complete. The live site has NOT been modified.</p>
          <p><strong>What to do:</strong></p>
          <ol>
            <li>Open the workflow run: <a href="$RUN_URL">$RUN_URL</a></li>
            <li>Scroll to the failed step (red ✗) and read the log</li>
            <li>Re-run the workflow manually once the issue is fixed</li>
          </ol>
          <p style="color:#666;font-size:12px;">If this is the second failure in a row, consider whether to manually create the week's content rather than letting the auto-job retry indefinitely.</p>
          </body></html>
          EOF
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "[PI Briefing] ⚠️ Friday staging failed (week $WEEK)" \
            --body-file failure.html || echo "(could not send failure email)"
