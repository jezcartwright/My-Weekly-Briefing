name: Friday Staging — Generate + Deploy Review Site + Draft Email

# Friday 12:00 London auto-run (Cloud Scheduler -> Cloud Function -> repository_dispatch):
#   1. generate next week's content into the `staging` branch
#   2. DEPLOY that content to the private review site and VERIFY it serves
#   3. build the Monday email (chatty synopsis) and save it as a Gmail draft
#   4. email jc@ the review link — which is now guaranteed live, because the deploy
#      happens BEFORE this email rather than on a separate 16:30 cron.
#
# The review-site deploy used to live in its own workflow on a later cron, which
# meant the "ready to review" email linked to a site that hadn't refreshed yet
# (stale for ~4.5h). Folding the deploy in here removes that gap entirely. The
# standalone deploy-staging-site.yml is now manual-only (a redeploy button).
#
# Still runnable manually via workflow_dispatch. The email subject/synopsis use the
# PUBLICATION week (the upcoming Monday's ISO week), not the Friday generation week.

on:
  # PRIMARY: Cloud Scheduler -> Cloud Function -> repository_dispatch (reliable, DST-aware).
  repository_dispatch:
    types: [generate-friday]
  workflow_dispatch:

jobs:
  stage-friday:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      STAGING_REVIEW_URL: https://weekly-briefing-staging-c635c.web.app   # permanent private review site
      STAGING_SITE: weekly-briefing-staging-c635c                          # the Firebase Hosting site id

    steps:
      - name: Checkout main (read-only, used as starting point)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Reset staging branch to current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin --delete staging || echo "  (no existing staging branch, that's fine)"
          git checkout -b staging
          git push origin staging
          echo "✓ staging branch reset from main ($(git rev-parse --short HEAD))"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests google-auth google-api-python-client

      - name: Generate content into staging branch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: staging
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: python generate_content.py

      - name: Pull the just-committed staging content
        run: |
          git fetch origin staging
          git checkout staging
          git pull --no-rebase origin staging
          echo "Staging now at: $(git log -1 --pretty=format:'%h %s')"

      # --- Deploy the review site FIRST, from the clean staging tree, and verify it
      # serves the new content, BEFORE we draft/send the review email. This is what
      # guarantees the link in that email is never stale. (Folded in from the old
      # deploy-staging-site.yml; identical deploy+verify logic, no separate checkout
      # needed because the working tree is already on staging.)
      - name: Deploy the private staging review site, then VERIFY it serves
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -uo pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/gsa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/gsa.json"

          cat > firebase.staging.json <<JSON
          {
            "hosting": {
              "site": "${STAGING_SITE}",
              "public": ".",
              "ignore": ["firebase.json","firebase.staging.json","firestore.rules","**/.*",".git/**","**/.git/**","**/node_modules/**",".github/**","*.md","**/*.py","functions/**","monday.html","friday_summary.html","served.html","served_index.html","deploy.out","deploy.err"]
            }
          }
          JSON

          echo "Deploying to site '${STAGING_SITE}'..."
          deployed=""
          for attempt in 1 2 3 4 5; do
            echo "=== deploy attempt ${attempt} ==="
            rm -rf "$HOME/.cache/firebase" 2>/dev/null || true
            if npx -y firebase-tools@latest deploy --only hosting \
                 --config firebase.staging.json --project pi-briefing-38ddc \
                 > deploy.out 2> deploy.err; then
              deployed=1; echo "deploy attempt ${attempt} succeeded"; break
            fi
            if grep -qi 'current active version' deploy.out deploy.err 2>/dev/null; then
              deployed=1; echo "content already current — treating as success"; break
            fi
            echo "attempt ${attempt} failed; last lines:"; tail -n 4 deploy.err 2>/dev/null; tail -n 4 deploy.out 2>/dev/null
            sleep 12
          done
          if [ -z "$deployed" ]; then
            echo "----- deploy stdout -----"; sed -n '1,80p' deploy.out 2>/dev/null || true
            echo "----- deploy stderr -----"; sed -n '1,80p' deploy.err 2>/dev/null || true
            echo "::error::All deploy attempts failed (upload never completed). See output above."
            exit 1
          fi
          tail -n 3 deploy.out 2>/dev/null || true

          URL="https://${STAGING_SITE}.web.app"
          ok=""
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o served.html -w '%{http_code}' "$URL" || echo 000)
            if [ "$CODE" = "200" ] && grep -q "Performance Intelligence Weekly Briefing" served.html; then
              ok=1; break
            fi
            echo "attempt $i: HTTP $CODE (propagating?) — retrying"; sleep 8
          done
          if [ -z "$ok" ]; then
            echo "----- deploy stdout -----"; sed -n '1,60p' deploy.out 2>/dev/null || true
            echo "----- deploy stderr -----"; sed -n '1,60p' deploy.err 2>/dev/null || true
            echo "::error::Staging site did not serve as expected. See deploy output above."
            exit 1
          fi

          if command -v sha256sum >/dev/null; then
            L=$(sha256sum index.html | awk '{print $1}')
            curl -s "$URL/index.html" -o served_index.html || true
            S=$(sha256sum served_index.html 2>/dev/null | awk '{print $1}')
            [ "$L" = "$S" ] && echo "Freshness confirmed: staging serves the exact content we built." \
                            || echo "Note: served copy not yet byte-identical (CDN still propagating); site is up."
          fi
          echo "✅ Private staging site is live: $URL"

      - name: Build Monday invitation email (chatty synopsis) from staging index.html
        id: build_email
        env:
          PREVIEW_URL: ${{ env.STAGING_REVIEW_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python build_monday_email.py index.html "$PREVIEW_URL" > monday.html
          echo "✓ monday.html built ($(wc -c < monday.html) bytes)"

      - name: Save Monday email as Gmail draft in jc@'s inbox
        id: save_draft
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          WEEK=$( [ "$(date -u +%u)" -eq 1 ] && date -u +%V || date -u -d "next monday" +%V )
          SUBJECT="Performance Intelligence Weekly Briefing — Week $WEEK"
          DRAFT_OUT=$(python -m mailer draft \
            --to "jc@jezcartwright.com" \
            --subject "$SUBJECT" \
            --body-file monday.html)
          echo "$DRAFT_OUT"
          DRAFT_ID=$(echo "$DRAFT_OUT" | grep -oE 'r-?[A-Za-z0-9_-]+|[0-9]+' | head -1)
          echo "draft_id=$DRAFT_ID" >> "$GITHUB_OUTPUT"

      - name: Email jc@ the Friday staging summary
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
          PREVIEW_URL: ${{ env.STAGING_REVIEW_URL }}
          DRAFT_ID: ${{ steps.save_draft.outputs.draft_id }}
        run: |
          WEEK=$( [ "$(date -u +%u)" -eq 1 ] && date -u +%V || date -u -d "next monday" +%V )
          cat > friday_summary.html <<HTML
          <html><body style="font-family:system-ui,sans-serif;font-size:14px;color:#222;">
          <h2 style="color:#ff6600;">PI Briefing Week $WEEK — Friday staging complete</h2>
          <p>Your next briefing has been auto-generated and is ready to review:</p>
          <ul>
            <li><strong>Review the week (private, permanent):</strong> <a href="$PREVIEW_URL">$PREVIEW_URL</a> &mdash; sign in with Google</li>
            <li><strong>Edit Monday's email:</strong> Open your Gmail Drafts — the chatty synopsis is saved there for you to edit over the weekend.</li>
          </ul>
          <p style="background:#fff8ee;border:1px solid #f0e8d0;padding:12px;border-radius:4px;">
          <strong>What happens next:</strong> On Monday at 08:00 London (07:00 UTC), the staging branch will be merged to main (deploying live), and the Gmail draft will be sent automatically — whether or not you've edited it.
          </p>
          <p>If you want to abort the Monday auto-publish, run the <strong>publish-monday</strong> workflow manually with the abort input, or delete the staging branch on GitHub.</p>
          <hr><p style="font-size:12px;color:#888;">Run: <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">view in Actions</a></p>
          </body></html>
          HTML
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "[PI Briefing] Week $WEEK staged — ready for your review" \
            --body-file friday_summary.html

      - name: Done
        run: |
          echo "✅ Friday staging complete."
          echo "   Review site (deployed + verified): ${{ env.STAGING_REVIEW_URL }}"
          echo "   Gmail draft saved in jc@jezcartwright.com inbox."

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          pip install google-auth google-api-python-client --quiet || true
          WEEK=$( [ "$(date -u +%u)" -eq 1 ] && date -u +%V || date -u -d "next monday" +%V )
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > failure.html <<HTML
          <html><body style="font-family:system-ui,sans-serif;font-size:14px;color:#222;">
          <h2 style="color:#c00;">PI Briefing Week $WEEK — Friday staging FAILED</h2>
          <p>The Friday auto-generate workflow did not complete. The live site has NOT been modified.</p>
          <p>Open the run: <a href="$RUN_URL">$RUN_URL</a>, read the failed step, fix, and re-run.</p>
          </body></html>
          HTML
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "[PI Briefing] ⚠️ Friday staging failed (week $WEEK)" \
            --body-file failure.html || echo "(could not send failure email)"
