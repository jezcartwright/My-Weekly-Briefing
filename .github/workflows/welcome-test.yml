name: Welcome Email — Test Send

# Manually send the welcome email to one address to preview how it lands.
# Uses the same send path (send_welcome.py) as the real auto-send, so the test
# reflects the friendly From, footer and one-click List-Unsubscribe header.

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Recipient email for the test'
        required: true
        default: 'jc@akindred.com'
      first_name:
        description: 'First name to greet in the email'
        required: false
        default: 'Jez'

jobs:
  welcome-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install google-auth google-api-python-client google-cloud-firestore
      - name: Send welcome test
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          TEST_EMAIL: ${{ github.event.inputs.to }}
          TEST_NAME: ${{ github.event.inputs.first_name }}
        run: python send_welcome.py
