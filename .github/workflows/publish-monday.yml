name: Monday Publish — Promote Staging + Deploy Live + Send Email

# Monday 08:00 London auto-run promotes staging to main, DEPLOYS the live site
# itself, verifies the new content is actually serving, and only then sends the
# Gmail draft prepared on Friday.
#
# WHY THIS WORKFLOW DEPLOYS DIRECTLY (do not "simplify" this away):
# The merge step pushes to main using the default GITHUB_TOKEN. GitHub
# deliberately does NOT trigger other workflows (e.g. deploy-firebase.yml) from
# pushes made with GITHUB_TOKEN — it is their built-in recursion guard. So the
# old assumption that "pushing to main auto-triggers the Firebase deploy" was
# false: content reached main every Monday but the live site was never
# redeployed unless a human happened to push something manually later in the
# week. That is exactly the silent failure this version fixes. We now deploy
# Hosting as an explicit step here and gate the subscriber email behind a
# live-site check, so a deploy problem fails loudly (emails jc@) and subscribers
# are never sent a link to stale content.
#
# RELIABILITY — WHY THE PRIMARY TRIGGER IS NO LONGER A GITHUB CRON:
# GitHub's `schedule` trigger is best-effort: under load GitHub delays or
# silently DROPS scheduled runs — with no error and no run in the Actions list.
# That (not a wrong cron time) is what caused missed Monday sends. GitHub cron is
# also UTC-only, so a fixed time drifts by an hour every BST/GMT change.
#
# We therefore drive the PRIMARY run from Google Cloud Scheduler
# (timezone Europe/London, 08:00 Monday) -> a small Cloud Function -> GitHub
# `repository_dispatch` (event type: publish-monday). Cloud Scheduler fires
# reliably and is timezone-aware, so 08:00 London is always 08:00 London with no
# seasonal hand-editing. See setup-dispatch-scheduler.sh + github_dispatch/.
#
# We KEEP one GitHub cron purely as an INDEPENDENT BACKSTOP (09:00 UTC Mon). It
# is still best-effort and still DST-drifts, but that no longer matters: it is
# only a safety net, it runs well after the primary, and its guard below no-ops
# if the primary already published. Net effect: two unrelated scheduling systems
# (Cloud Scheduler + GitHub cron) would BOTH have to fail for a Monday to be
# missed. Manual workflow_dispatch always runs regardless of staging state.

on:
  # PRIMARY: Cloud Scheduler -> Cloud Function -> repository_dispatch (reliable, DST-aware).
  repository_dispatch:
    types: [publish-monday]

  # BACKSTOP ONLY: independent GitHub cron in case Cloud Scheduler ever fails. Best-effort
  # and DST-drifting, but harmless — it runs after the primary and its guard no-ops if the
  # primary already published. In winter (GMT) it lands an hour earlier in London; fine.
  schedule:
    - cron: '0 9 * * 1'   # BACKSTOP: 09:00 UTC Mon (10:00 London BST / 09:00 GMT).

  workflow_dispatch:
    inputs:
      abort:
        description: 'Set to "true" to abort publish (skip merge + deploy + email)'
        required: false
        default: 'false'
      skip_merge:
        description: 'Set to "true" to skip the staging->main merge (re-deploy + re-send current main; useful when staging is already gone)'
        required: false
        default: 'false'
      recipient_override:
        description: 'Override subscriber list with a single email (testing). Leave empty for normal subscriber-list send.'
        required: false
        default: ''

jobs:
  publish-monday:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check abort flag
        if: ${{ github.event.inputs.abort == 'true' }}
        run: |
          echo "Aborted by user input. Staging branch left intact; nothing was published."
          exit 78  # neutral exit, marks the run as skipped

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- BACKSTOP GUARD ---
      # Only relevant when this run was triggered by the 09:00 backstop cron. If the
      # primary (Cloud Scheduler -> repository_dispatch) already published, the staging
      # branch has been deleted, so we exit cleanly and do nothing. If staging still
      # exists, the primary did not complete — fall through and publish normally. The
      # repository_dispatch primary and manual dispatch runs skip this guard entirely.
      - name: Backstop guard (only the 09:00 cron checks if primary already ran)
        if: ${{ github.event.schedule == '0 9 * * 1' }}
        run: |
          git fetch origin 'refs/heads/staging:refs/remotes/origin/staging' 2>/dev/null || true
          if git rev-parse --verify origin/staging >/dev/null 2>&1; then
            echo "::notice::Backstop run: staging branch still exists — the primary did NOT complete. Proceeding to publish."
          else
            echo "::notice::Backstop run: staging branch is gone — the primary already published. Nothing to do."
            echo "BACKSTOP_NOOP=true" >> "$GITHUB_ENV"
          fi

      - name: Verify staging branch exists and is ahead of main
        if: ${{ env.BACKSTOP_NOOP != 'true' && github.event.inputs.skip_merge != 'true' }}
        id: verify_staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          if ! git rev-parse --verify origin/staging >/dev/null 2>&1; then
            echo "::error::No staging branch found. Either Friday's generate did not run, or you re-ran a normal publish after this week was already published (in that case re-run with skip_merge=true instead)."
            exit 1
          fi
          AHEAD=$(git rev-list --count origin/main..origin/staging)
          BEHIND=$(git rev-list --count origin/staging..origin/main)
          echo "staging is $AHEAD commits ahead of main and $BEHIND commits behind"
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::Staging has no new commits compared to main. Nothing to publish."
            exit 1
          fi
          if [ "$BEHIND" -gt 0 ]; then
            echo "::notice::Main has moved $BEHIND commit(s) since staging was created - the 3-way merge step will reconcile this week's content with the mid-week UI changes."
          fi

      - name: Merge staging into main (3-way; handles main moving during the week)
        if: ${{ env.BACKSTOP_NOOP != 'true' && github.event.inputs.skip_merge != 'true' }}
        run: |
          git fetch origin main staging
          git checkout main
          git pull --ff-only origin main
          # NOT --ff-only on the merge: main collects mid-week UI commits, so staging is
          # almost never a fast-forward. Content (D.* arrays) and UI (CSS/JS) occupy
          # different regions of index.html, so a 3-way merge combines them
          # automatically. A genuine same-region conflict aborts and fails loudly,
          # leaving staging intact for manual fixing.
          if ! git merge --no-edit -m "Publish: merge staging (weekly content) into main" origin/staging; then
            echo "::error::Merge conflict between staging and main. Staging left intact - resolve manually: git checkout main && git merge origin/staging, fix index.html, commit, push."
            git merge --abort || true
            exit 1
          fi
          git push origin main
          echo "staging merged to main ($(git rev-parse --short HEAD))"

      - name: Make sure working tree is the latest main (covers skip_merge re-runs)
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          echo "Deploying main at: $(git rev-parse --short HEAD)"

      # --- THE FIX: deploy the live site explicitly, here. ---
      # A push to main with GITHUB_TOKEN does NOT trigger deploy-firebase.yml, so we
      # must deploy Hosting ourselves. We call the Firebase CLI directly (rather than
      # the action) so we can tolerate the benign "is the current active version" 400:
      # that response means the content being deployed is byte-identical to what is
      # already live (e.g. on a re-run after a partial failure). That is NOT a failure
      # for our purposes — the Verify step below is the real gate. Any OTHER deploy
      # failure (auth, etc.) still fails the job loudly.
      #
      # IMPORTANT: this step deliberately keeps `set -e` OFF (we EXPECT a non-zero
      # exit from the CLI on a no-op deploy and handle it ourselves). CLI output is
      # written to a file and read with `grep -F` — never piped — so an early pipe
      # close can't kill the step before our explicit `exit`.
      - name: Deploy to Firebase Hosting (live)
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        shell: bash
        run: |
          set +e +o pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"

          npx firebase-tools@latest deploy --only hosting --project pi-briefing-38ddc --non-interactive > "$RUNNER_TEMP/deploy.log" 2>&1
          STATUS=$?
          rm -f "$RUNNER_TEMP/sa.json"

          echo "----- firebase deploy output -----"
          cat "$RUNNER_TEMP/deploy.log"
          echo "----- end deploy output (exit status: $STATUS) -----"

          if [ "$STATUS" -eq 0 ]; then
            echo "Deploy succeeded (new version released)."
            exit 0
          fi

          if grep -qF "is the current active version" "$RUNNER_TEMP/deploy.log"; then
            echo "::notice::Deploy returned the benign 'current active version' 400 - content is already live and identical. Continuing to the live-site verification."
            exit 0
          fi

          echo "::error::Firebase deploy failed for a non-benign reason (see log above). Subscribers were NOT emailed."
          exit "$STATUS"

      # --- THE POLICE: confirm the site is actually serving before we email anyone. ---
      # If this fails, the workflow fails, jc@ gets the failure email below, the
      # staging branch is left intact, and subscribers are NOT sent a stale link.
      - name: Verify the live site is serving after deploy
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        run: |
          echo "Waiting for Hosting propagation, then verifying https://weeklybriefing.jezcartwright.com ..."
          for i in 1 2 3 4 5 6; do
            sleep 10
            CODE=$(curl -s -o body.html -w '%{http_code}' "https://weeklybriefing.jezcartwright.com/index.html?cb=${GITHUB_RUN_ID}-$i" || echo "000")
            if [ "$CODE" = "200" ] && grep -q "<title>Performance Intelligence Weekly Briefing</title>" body.html; then
              echo "Live site responded HTTP 200 with the expected masthead/title on attempt $i."
              exit 0
            fi
            echo "  attempt $i: HTTP $CODE (or title missing) - retrying..."
          done
          echo "::error::Live site did not serve the expected page after deploy. Hosting deploy likely failed - subscribers were NOT emailed."
          exit 1

      - name: Set up Python
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        run: pip install google-auth google-api-python-client google-cloud-firestore

      - name: Send teaser to each subscriber (per-recipient with unsubscribe)
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          RECIPIENT_OVERRIDE: ${{ github.event.inputs.recipient_override }}
        run: |
          python publish_to_subscribers.py

      - name: Delete staging branch (cleanup)
        if: ${{ success() && env.BACKSTOP_NOOP != 'true' && github.event.inputs.skip_merge != 'true' }}
        run: |
          git push origin --delete staging
          echo "staging branch deleted; ready for next Friday."

      # --- SUCCESS CONFIRMATION ---
      # Silent success used to mean "no signal either way" — if a cron never fired you
      # got nothing. This sends a short confirmation to jc@ on a genuine publish, so
      # NO confirmation by ~08:30 Monday is itself the alarm: check Actions. The
      # backstop no-op run does NOT send this (the primary already did).
      - name: Confirm success to jc@
        if: ${{ success() && env.BACKSTOP_NOOP != 'true' }}
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          pip install google-auth google-api-python-client --quiet || true
          WEEK=$(date -u +%V)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > success.html <<EOF
          <html><body style="font-family:system-ui,sans-serif;font-size:14px;color:#222;">
          <h2 style="color:#2E7A3E;">PI Briefing Week $WEEK - published OK</h2>
          <p>The Monday auto-publish completed: live site deployed + verified, and the
          briefing email was sent to subscribers.</p>
          <p>Run: <a href="$RUN_URL">$RUN_URL</a></p>
          <p><em>If you ever do NOT receive this email by ~08:30 London on a Monday,
          the scheduled run may not have fired — open Actions and trigger "Monday Publish" manually.</em></p>
          </body></html>
          EOF
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "[PI Briefing] Published OK (week $WEEK)" \
            --body-file success.html || echo "(could not send success email)"

      - name: Done
        if: ${{ env.BACKSTOP_NOOP != 'true' }}
        run: |
          echo "Monday publish complete."
          echo "  Live site deployed + verified at https://weeklybriefing.jezcartwright.com"
          echo "  Teaser email sent from jc@jezcartwright.com."

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          pip install google-auth google-api-python-client --quiet || true
          WEEK=$(date -u +%V)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > failure.html <<EOF
          <html><body style="font-family:system-ui,sans-serif;font-size:14px;color:#222;">
          <h2 style="color:#c00;">PI Briefing Week $WEEK - Monday publish FAILED</h2>
          <p>The Monday auto-publish workflow did not complete. Because the subscriber
          email is gated behind a successful, verified live deploy, if you are seeing
          this it most likely means the email was NOT sent - check the Gmail Sent folder to be sure.</p>
          <p><strong>Benign case:</strong> if you re-ran a normal publish after this week was
          already published, you will see "No staging branch found" — that is expected, nothing
          was sent, ignore it. To re-deploy/re-send an already-published week, re-run with
          skip_merge = true.</p>
          <p><strong>What to do otherwise:</strong></p>
          <ol>
            <li>Open the workflow run: <a href="$RUN_URL">$RUN_URL</a> and read the failed step.</li>
            <li>If the <strong>Deploy</strong> or <strong>Verify</strong> step failed, the live site may be stale - fix and re-run this workflow (staging is left intact for re-runs).</li>
            <li>If the merge step failed, the staging branch still exists; resolve the conflict and re-run.</li>
          </ol>
          </body></html>
          EOF
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "[PI Briefing] Monday publish failed (week $WEEK)" \
            --body-file failure.html || echo "(could not send failure email)"
