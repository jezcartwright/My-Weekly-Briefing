name: Rebuild + Send Current Week Teaser (manual)

# Re-renders the teaser email from the CURRENT main branch content and
# sends it directly to jc@ — no draft step. Useful for:
#   - Testing email template changes against existing published content
#   - Resending today's email after a design fix
#
# Does NOT regenerate content. Does NOT route through subscribers list.
# Always sends to jc@jezcartwright.com.
#
# Always manual — no cron.

on:
  workflow_dispatch:
    inputs:
      subject_suffix:
        description: 'Optional suffix added to the email subject (e.g. " — preview")'
        required: false
        default: ' — mobile preview'

jobs:
  rebuild-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Render teaser HTML from current main
        id: render
        run: |
          python build_teaser.py index.html > /tmp/teaser.html
          echo "size=$(wc -c < /tmp/teaser.html)" >> $GITHUB_OUTPUT
          echo "Rendered teaser HTML — $(wc -c < /tmp/teaser.html) bytes"

      - name: Strip any reviewer blocks (safety, in case template still has them)
        run: |
          python -c "
          import re
          with open('/tmp/teaser.html') as f: html = f.read()
          before = len(html)
          html = re.sub(r'<div[^>]*data-strip-on-send=\"true\"[^>]*>.*?</div>', '', html, flags=re.DOTALL|re.IGNORECASE)
          with open('/tmp/teaser.html', 'w') as f: f.write(html)
          print(f'Strip pass: {before} -> {len(html)} bytes')
          "

      - name: Compute subject
        id: subj
        run: |
          WEEK=$(date -u +%V)
          DATE=$(date -u +"%-d %B %Y")
          SUFFIX="${{ github.event.inputs.subject_suffix }}"
          echo "subject=Performance Intelligence Weekly Briefing — Week ${WEEK}${SUFFIX}" >> $GITHUB_OUTPUT

      - name: Send via mailer.py
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          python -m mailer send \
            --to "jc@jezcartwright.com" \
            --subject "${{ steps.subj.outputs.subject }}" \
            --body-file /tmp/teaser.html
