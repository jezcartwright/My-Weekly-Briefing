name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    # Only deploy when files that are ACTUALLY part of the live site change.
    # A push that only touches workflow files, Python, docs, functions, or
    # firestore rules deploys nothing new — so Firebase rejects it with
    # "is the current active version" (HTTP 400). Skipping those pushes avoids
    # the spurious failure entirely, with no scripting to get wrong.
    # (firebase.json is intentionally NOT ignored: changing it changes the
    # deployed file set, so it should trigger a deploy.)
    paths-ignore:
      - '.github/**'
      - '**/*.py'
      - '**/*.md'
      - 'functions/**'
      - 'firestore.rules'
      - '.preview-url'
  workflow_dispatch:   # manual runs always work and ignore the path filter

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pi-briefing-38ddc
