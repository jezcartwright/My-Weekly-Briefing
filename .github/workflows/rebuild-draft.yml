name: Rebuild Teaser Draft (manual)

# Re-renders the teaser email from the CURRENT main branch content and
# creates a Gmail DRAFT (does not send). Useful for:
#   - Testing email template changes against existing published content
#   - Re-drafting today's email after a design fix so you can review
#     and edit before sending
#
# Does NOT regenerate content. Does NOT route through subscribers list.
# Always drafts to jc@jezcartwright.com — you can edit the To: in Gmail
# before sending, or pass the draft through publish-monday for auto-send.
#
# Always manual — no cron.

on:
  workflow_dispatch:
    inputs:
      subject_suffix:
        description: 'Optional suffix added to the email subject (default empty)'
        required: false
        default: ''

jobs:
  rebuild-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Render teaser HTML from current main
        id: render
        run: |
          python build_teaser.py index.html > /tmp/teaser.html
          echo "Rendered teaser HTML — $(wc -c < /tmp/teaser.html) bytes"

      - name: Compute subject
        id: subj
        run: |
          WEEK=$(date -u +%V)
          SUFFIX="${{ github.event.inputs.subject_suffix }}"
          echo "subject=Performance Intelligence Weekly Briefing — Week ${WEEK}${SUFFIX}" >> $GITHUB_OUTPUT

      - name: Create draft via mailer.py
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          python -m mailer draft \
            --to "jc@jezcartwright.com" \
            --subject "${{ steps.subj.outputs.subject }}" \
            --body-file /tmp/teaser.html
          echo "Draft created. Open Gmail to review and edit."
