name: Rebuild Draft Only — from current staging

# Lightweight workflow that rebuilds the Monday teaser draft from the
# CURRENT contents of the staging branch, without re-generating content.
#
# Use cases:
#   - You sent/deleted the existing draft and need a fresh one for editing
#   - You manually edited index.html on staging and want the draft to match
#   - You changed build_teaser.py and want to regenerate the draft
#
# Does NOT run Claude (no API cost), does NOT touch main, does NOT redeploy
# the preview channel.

on:
  workflow_dispatch:

jobs:
  rebuild-draft:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout main (code — build_teaser.py + mailer.py)"
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Overlay staging's index.html and .preview-url
        run: |
          # Grab index.html and (if it exists) the persisted preview URL
          # from staging, leaving build_teaser.py + mailer.py at the main
          # version. The .preview-url file is only present from Friday
          # workflows that ran after that feature was added; rebuild gracefully
          # if it's not there.
          git fetch origin staging --depth=1
          git checkout origin/staging -- index.html
          if git show origin/staging:.preview-url >/dev/null 2>&1; then
            git checkout origin/staging -- .preview-url
            echo "Preview URL found: $(cat .preview-url)"
          else
            echo "(no .preview-url on staging — the draft will not include a reviewer block this time)"
            echo "" > .preview-url
          fi
          echo "Code from main:    $(git log -1 --pretty=format:'%h %s')"
          echo "Content from staging: $(git log origin/staging -1 --pretty=format:'%h %s')"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Gmail dependencies
        run: pip install google-auth google-api-python-client

      - name: Compute ISO week
        id: week
        run: echo "n=$(date -u +%V)" >> "$GITHUB_OUTPUT"

      - name: Build teaser email from staging index.html
        run: |
          # Read the actual preview URL that the Friday workflow saved to
          # staging — no guessing at URL patterns.
          PREVIEW_URL=$(cat .preview-url | tr -d '[:space:]')
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::.preview-url is empty. The reviewer block in the draft will be omitted."
          fi
          python build_teaser.py index.html "$PREVIEW_URL" > teaser.html
          echo "✓ teaser.html built ($(wc -c < teaser.html) bytes)"
          echo "  preview URL embedded: $PREVIEW_URL"

      - name: Save as Gmail draft
        env:
          GMAIL_SA_JSON: ${{ secrets.GMAIL_SA_JSON }}
        run: |
          WEEK="${{ steps.week.outputs.n }}"
          SUBJECT="Performance Intelligence Weekly Briefing — Week $WEEK"
          python -m mailer draft \
            --to "jc@jezcartwright.com" \
            --subject "$SUBJECT" \
            --body-file teaser.html
          echo "✓ Draft saved in jc@jezcartwright.com Drafts folder."
          echo "  Edit at your leisure; Monday workflow will send whatever's there."
